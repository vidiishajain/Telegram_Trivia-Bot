{% extends "base.html" %}
{% block content %}
<h1 class="text-3xl font-bold">🔒 Protected</h1>
<p class="mt-2 text-slate-400">Enter the password to continue.</p>
<form method="post" action="/login" class="mt-6 space-y-3">
  <input type="password" name="password" required autofocus
    class="w-full rounded-xl border border-slate-700 bg-slate-900 p-4 text-slate-100
           focus:outline-none focus:ring-2 focus:ring-sky-500"
    placeholder="password">
  {% if error %}<p class="text-red-400">Wrong password — try again.</p>{% endif %}
  <button type="submit"
    class="w-full rounded-xl bg-sky-600 px-4 py-3 font-semibold hover:bg-sky-500 transition">
    Enter →
  </button>
</form>
{% endblock %}
